<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070B14"/>
      <stop offset="50%" stop-color="#0A1124"/>
      <stop offset="100%" stop-color="#0D1730"/>
    </linearGradient>

    <!-- Glassmorphic Card Overlay Gradient -->
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Border Glow Gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A84FF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#5E5CE6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#30D158" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Accent Text Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64D2FF"/>
      <stop offset="50%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#5E5CE6"/>
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60" result="blur"/>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="80" result="blur"/>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background Base -->
  <rect width="1200" height="320" rx="16" fill="url(#bg-grad)"/>

  <!-- Grid Overlay -->
  <rect width="1200" height="320" rx="16" fill="url(#grid)"/>

  <!-- Glowing Orbs (Apple Ambient Light Effect) -->
  <circle cx="200" cy="80" r="140" fill="#0A84FF" opacity="0.25" filter="url(#glow-blue)"/>
  <circle cx="1000" cy="240" r="160" fill="#5E5CE6" opacity="0.2" filter="url(#glow-purple)"/>
  <circle cx="600" cy="160" r="100" fill="#64D2FF" opacity="0.12" filter="url(#glow-blue)"/>

  <!-- Outer Frame Border -->
  <rect x="1" y="1" width="1198" height="318" rx="15" fill="none" stroke="url(#border-grad)" stroke-width="1.5" opacity="0.7"/>

  <!-- Central Glassmorphic Card Container -->
  <rect x="60" y="45" width="1080" height="230" rx="20" fill="url(#glass-grad)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Apple Swift Accent Monogram/Icon -->
  <g transform="translate(100, 85)">
    <!-- Icon Container Box -->
    <rect width="80" height="80" rx="18" fill="#0D1B3A" stroke="#0A84FF" stroke-opacity="0.4" stroke-width="1.5"/>
    <!-- Swift Bird Graphic Vector -->
    <path d="M 62 20 C 50 34 36 38 22 36 C 34 44 48 44 58 38 C 42 46 26 44 18 36 C 26 48 42 56 60 52 C 40 58 22 52 16 46 C 24 60 48 64 66 54 C 54 62 36 62 24 58 C 38 66 58 64 68 52 C 68 52 64 36 62 20 Z" fill="url(#text-grad)"/>
  </g>

  <!-- Typography Content -->
  <!-- Name -->
  <text x="210" y="115" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="38" font-weight="800" fill="#FFFFFF" letter-spacing="0.5">
    Siddharth Shah
  </text>

  <!-- Title Badge -->
  <rect x="210" y="132" width="220" height="30" rx="8" fill="#0A84FF" fill-opacity="0.15" stroke="#0A84FF" stroke-opacity="0.4" stroke-width="1"/>
  <text x="320" y="152" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="14" font-weight="700" fill="#64D2FF" text-anchor="middle" letter-spacing="1">
    SENIOR iOS ENGINEER
  </text>

  <!-- Subtitle Line -->
  <text x="210" y="196" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="400" fill="#A1A1AA" letter-spacing="0.2">
    Architecting high-performance, resilient &amp; accessible native iOS applications
  </text>

  <!-- Technology Pills Row -->
  <g transform="translate(210, 215)">
    <!-- Pill 1: Swift 6 -->
    <rect x="0" y="0" width="85" height="26" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="42.5" y="17" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="#E4E4E7" text-anchor="middle">Swift 6</text>

    <!-- Pill 2: SwiftUI & UIKit -->
    <rect x="95" y="0" width="130" height="26" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="160" y="17" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="#E4E4E7" text-anchor="middle">SwiftUI &amp; UIKit</text>

    <!-- Pill 3: Clean Architecture -->
    <rect x="235" y="0" width="145" height="26" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="307.5" y="17" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="#E4E4E7" text-anchor="middle">Clean Architecture</text>

    <!-- Pill 4: Enterprise SDKs -->
    <rect x="390" y="0" width="130" height="26" rx="6" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="455" y="17" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="#E4E4E7" text-anchor="middle">Enterprise SDKs</text>
  </g>
</svg>
