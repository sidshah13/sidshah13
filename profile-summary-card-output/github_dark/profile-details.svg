<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Recent activity placeholder card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="320" rx="20" fill="url(#bg)"/>
  <rect x="42" y="42" width="1116" height="236" rx="18" fill="#0b1220" stroke="#1f2937"/>
  <rect x="70" y="70" width="260" height="12" rx="6" fill="url(#accent)"/>
  <text x="70" y="128" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700">Recent activity card</text>
  <text x="70" y="168" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="18">This placeholder is replaced by the daily GitHub Actions workflow.</text>
  <text x="70" y="206" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="18">It keeps the profile readable before the first scheduled run completes.</text>
</svg>
