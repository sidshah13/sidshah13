name: Update Profile Assets

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  generate-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN || github.token }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          AUTO_PUSH: false
          THEME: github_dark
          ANIMATION: load
          DURATION: '3'
          NAME: Siddharth Shah

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-contribution-grid-snake.svg?palette=github
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit generated assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(profile): refresh summary cards and snake animation'
          file_pattern: |
            profile-summary-card-output/
            assets/github-contribution-grid-snake.svg
            assets/github-contribution-grid-snake-dark.svg